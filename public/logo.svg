  <!-- Left flowing cape/dress curve -->
  <path d="M 113 49 C 102 61 84 76 80 98" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right flowing cape/dress curve -->
  <path d="M 127 49 C 138 61 156 76 160 98" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Lower figure connecting arcs -->
