<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Blue circle background -->
  <circle cx="120" cy="120" r="118" fill="#1980e6"/>

  <!-- Feminine figure mark -->
  <!-- Head -->
