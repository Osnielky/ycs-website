name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ycs-leads
  REGION:     us-east1
  SERVICE:    ycs-website
  REGISTRY:   us-east1-docker.pkg.dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ycs-website/${{ env.SERVICE }}:${{ github.sha }}
          docker build \
            -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},CLINIC_EMAIL=${{ secrets.CLINIC_EMAIL }},ADMIN_USER=${{ secrets.ADMIN_USER }},ADMIN_PASS=${{ secrets.ADMIN_PASS }},ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}"
