name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ycs-leads
  REGION:     us-east1
  SERVICE:    ycs-website
  REGISTRY:   us-east1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ycs-website/${{ env.SERVICE }}:${{ github.sha }}
          docker build \
            --build-arg SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --build-arg SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" \
            --build-arg RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            --build-arg CLINIC_EMAIL="${{ secrets.CLINIC_EMAIL }}" \
            -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},CLINIC_EMAIL=${{ secrets.CLINIC_EMAIL }}"
